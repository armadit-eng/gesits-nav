<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GNav</title>
<link rel="manifest" href="manifest.json">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #00d4ff;
    --accent2: #ff4444;
    --text: #f0f0f0;
    --text2: #888;
    --green: #00e676;
    --orange: #ff9100;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }

  #map { position: fixed; inset: 0; z-index: 0; }

  /* TOP BAR */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(to bottom, rgba(10,10,10,0.97) 70%, transparent);
    padding: 48px 16px 24px;
  }

  #search-row {
    display: flex; gap: 8px; align-items: center;
  }

  #search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px; padding: 12px 16px;
    outline: none; transition: border-color .2s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text2); }

  #btn-search {
    background: var(--accent); border: none; border-radius: 12px;
    width: 46px; height: 46px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #btn-search svg { width: 20px; height: 20px; fill: #000; }

  /* SEARCH RESULTS */
  #search-results {
    margin-top: 8px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    display: none;
  }
  .search-item {
    padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: var(--surface2); }
  .search-item .place-name { font-size: 14px; font-weight: 500; }
  .search-item .place-addr { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* NAV INSTRUCTION PANEL */
  #nav-panel {
    position: fixed; top: 0; left: 0; right: 0; z-index: 110;
    background: var(--bg); padding: 48px 16px 16px;
    display: none; flex-direction: column; gap: 10px;
  }

  #instruction-main {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border-radius: 14px; padding: 14px 16px;
  }
  #maneuver-icon {
    width: 48px; height: 48px; background: var(--accent);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #maneuver-icon svg { width: 28px; height: 28px; fill: #000; }
  #instruction-text { flex: 1; }
  #inst-distance { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
  #inst-text { font-size: 15px; margin-top: 3px; }

  #nav-meta {
    display: flex; gap: 8px;
  }
  .meta-chip {
    flex: 1; background: var(--surface); border-radius: 10px;
    padding: 10px 12px; text-align: center;
  }
  .meta-chip .val { font-size: 18px; font-weight: 700; }
  .meta-chip .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

  #btn-stop-nav {
    background: var(--accent2); border: none; border-radius: 12px;
    color: #fff; font-size: 14px; font-weight: 600; padding: 12px;
    cursor: pointer; letter-spacing: .5px;
  }

  /* BOTTOM PANEL */
  #bottom-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(to top, rgba(10,10,10,0.98) 80%, transparent);
    padding: 16px 16px 32px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* BLE STATUS */
  #ble-row {
    display: flex; align-items: center; gap: 10px;
  }

  #btn-ble {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; cursor: pointer;
    color: var(--text); font-size: 13px; font-weight: 500;
    transition: border-color .2s, background .2s; flex: 1;
  }
  #btn-ble.connected { border-color: var(--green); }
  #btn-ble.connected #ble-dot { background: var(--green); }
  #ble-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text2); flex-shrink: 0;
    transition: background .3s;
  }
  #ble-label { flex: 1; }

  #ble-send-status {
    font-size: 11px; color: var(--text2); text-align: right;
    min-width: 60px;
  }

  /* BOTTOM BUTTONS */
  #btn-row {
    display: flex; gap: 8px;
  }
  .btn-action {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 500;
    padding: 11px 8px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; gap: 6px;
    transition: background .15s;
  }
  .btn-action:hover { background: var(--surface2); }
  .btn-action svg { width: 16px; height: 16px; fill: currentColor; }
  .btn-action.active { border-color: var(--accent); color: var(--accent); }

  /* TOKEN MODAL */
  #token-modal {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  #token-card {
    background: var(--surface); border-radius: 16px; padding: 24px;
    width: 100%; max-width: 380px;
  }
  #token-card h2 { font-size: 18px; margin-bottom: 6px; }
  #token-card p { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }
  #token-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 13px;
    padding: 12px; outline: none; margin-bottom: 12px;
    font-family: monospace;
  }
  #token-input:focus { border-color: var(--accent); }
  #btn-save-token {
    width: 100%; background: var(--accent); border: none;
    border-radius: 10px; color: #000; font-size: 14px;
    font-weight: 700; padding: 13px; cursor: pointer;
  }

  /* TOAST */
  #toast {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px; font-size: 13px;
    opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none;
    z-index: 300; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MAPBOX overrides */
  .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none; }
  .mapboxgl-ctrl-top-right { top: 60px !important; }

  /* Locate button */
  #btn-locate {
    position: fixed; right: 16px; bottom: 150px; z-index: 100;
    width: 44px; height: 44px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text);
  }
  #btn-locate svg { width: 20px; height: 20px; fill: currentColor; }

  /* Hidden canvas for screenshot */
  #snap-canvas { display: none; }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="snap-canvas"></canvas>

<!-- TOKEN MODAL -->
<div id="token-modal">
  <div id="token-card">
    <h2>🗺️ GNav Setup</h2>
    <p>Masukkan Mapbox Public Token kamu. Token disimpan di browser, tidak dikirim ke server.</p>
    <input id="token-input" type="text" placeholder="pk.eyJ1IjoiY..." spellcheck="false">
    <button id="btn-save-token">Simpan & Mulai</button>
  </div>
</div>

<!-- MAP UI -->
<div id="topbar">
  <div id="search-row">
    <input id="search-input" type="text" placeholder="Cari tujuan...">
    <button id="btn-search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </div>
  <div id="search-results"></div>
</div>

<!-- NAV PANEL (visible during navigation) -->
<div id="nav-panel">
  <div id="instruction-main">
    <div id="maneuver-icon">
      <svg id="maneuver-svg" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
    </div>
    <div id="instruction-text">
      <div id="inst-distance">--</div>
      <div id="inst-text">Memulai navigasi...</div>
    </div>
  </div>
  <div id="nav-meta">
    <div class="meta-chip">
      <div class="val" id="meta-dist">--</div>
      <div class="lbl">Jarak</div>
    </div>
    <div class="meta-chip">
      <div class="val" id="meta-eta">--</div>
      <div class="lbl">ETA</div>
    </div>
    <div class="meta-chip">
      <div class="val" id="meta-speed">0</div>
      <div class="lbl">km/h</div>
    </div>
  </div>
  <button id="btn-stop-nav">■ STOP NAVIGASI</button>
</div>

<!-- BOTTOM PANEL -->
<div id="bottom-panel">
  <div id="ble-row">
    <button id="btn-ble">
      <div id="ble-dot"></div>
      <span id="ble-label">Hubungkan Dashboard</span>
    </button>
    <div id="ble-send-status">–</div>
  </div>
  <div id="btn-row">
    <button class="btn-action" id="btn-voice" title="Voice">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      Suara
    </button>
    <button class="btn-action" id="btn-night" title="Night mode">
      <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
      Malam
    </button>
    <button class="btn-action" id="btn-settings" title="Settings">
      <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      Token
    </button>
  </div>
</div>

<button id="btn-locate">
  <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
</button>

<div id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
let map, userMarker, destMarker, routeGeojson;
let bleDevice = null, bleChar = null;
let bleConnected = false;
let isNavigating = false;
let voiceEnabled = true;
let nightMode = false;
let userLng = null, userLat = null;
let watchId = null;
let currentStepIdx = 0;
let routeSteps = [];
let lastSpokenStep = -1;
let sendInterval = null;
let imageQuality = 0.25; // JPEG quality — tune until base64 < 7000 chars

const MAPBOX_TOKEN_KEY = 'gnav_mapbox_token';
const BLE_SERVICE = '0000fff1-0000-1000-8000-00805f9b34fb';
const BLE_CHAR   = '0000fff2-0000-1000-8000-00805f9b34fb';

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  const saved = localStorage.getItem(MAPBOX_TOKEN_KEY);
  if (saved) { initMap(saved); }
  else { document.getElementById('token-modal').style.display = 'flex'; }

  document.getElementById('btn-save-token').addEventListener('click', () => {
    const t = document.getElementById('token-input').value.trim();
    if (!t.startsWith('pk.')) { showToast('Token tidak valid'); return; }
    localStorage.setItem(MAPBOX_TOKEN_KEY, t);
    document.getElementById('token-modal').style.display = 'none';
    initMap(t);
  });

  document.getElementById('btn-settings').addEventListener('click', () => {
    document.getElementById('token-modal').style.display = 'flex';
    document.getElementById('token-input').value = localStorage.getItem(MAPBOX_TOKEN_KEY) || '';
  });

  document.getElementById('btn-ble').addEventListener('click', toggleBle);
  document.getElementById('btn-stop-nav').addEventListener('click', stopNavigation);
  document.getElementById('btn-locate').addEventListener('click', centerOnUser);
  document.getElementById('btn-voice').addEventListener('click', toggleVoice);
  document.getElementById('btn-night').addEventListener('click', toggleNight);
  document.getElementById('btn-search').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
});

function initMap(token) {
  mapboxgl.accessToken = token;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    zoom: 14,
    center: [106.816666, -6.200000],
    pitch: 0,
  });

  map.addControl(new mapboxgl.NavigationControl({ showCompass: true, visualizePitch: true }), 'top-right');

  map.on('load', () => {
    startGPS();
    map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({
      id: 'route-line', type: 'line', source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': '#00d4ff', 'line-width': 5, 'line-opacity': 0.9 }
    });
  });

  map.on('click', e => {
    if (!isNavigating) setDestination(e.lngLat.lng, e.lngLat.lat, 'Titik yang dipilih');
  });
}

// ============================================================
// GPS
// ============================================================
function startGPS() {
  if (!navigator.geolocation) { showToast('GPS tidak tersedia'); return; }
  watchId = navigator.geolocation.watchPosition(pos => {
    userLng = pos.coords.longitude;
    userLat = pos.coords.latitude;
    const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
    document.getElementById('meta-speed').textContent = speed;

    if (!userMarker) {
      const el = document.createElement('div');
      el.style.cssText = 'width:16px;height:16px;background:#00d4ff;border:3px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(0,212,255,0.6)';
      userMarker = new mapboxgl.Marker({ element: el }).setLngLat([userLng, userLat]).addTo(map);
      map.flyTo({ center: [userLng, userLat], zoom: 15 });
    } else {
      userMarker.setLngLat([userLng, userLat]);
    }

    if (isNavigating) {
      updateNavProgress();
      if (bleConnected) captureAndSend();
    }
  }, err => {
    showToast('GPS: ' + err.message);
  }, { enableHighAccuracy: true, maximumAge: 1000 });
}

function centerOnUser() {
  if (userLng) map.flyTo({ center: [userLng, userLat], zoom: 16, pitch: 45 });
}

// ============================================================
// SEARCH (Mapbox Geocoding)
// ============================================================
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const token = localStorage.getItem(MAPBOX_TOKEN_KEY);
  const prox = userLng ? `&proximity=${userLng},${userLat}` : '';
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${token}&language=id&country=ID${prox}&limit=5`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    showSearchResults(d.features || []);
  } catch(e) { showToast('Gagal mencari lokasi'); }
}

function showSearchResults(features) {
  const el = document.getElementById('search-results');
  el.innerHTML = '';
  if (!features.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  features.forEach(f => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.innerHTML = `<div class="place-name">${f.text}</div><div class="place-addr">${f.place_name}</div>`;
    div.addEventListener('click', () => {
      el.style.display = 'none';
      document.getElementById('search-input').value = f.text;
      setDestination(f.center[0], f.center[1], f.text);
    });
    el.appendChild(div);
  });
}

// ============================================================
// DESTINATION & ROUTING
// ============================================================
function setDestination(lng, lat, name) {
  if (destMarker) destMarker.remove();
  const el = document.createElement('div');
  el.style.cssText = 'width:20px;height:20px;background:#ff4444;border:3px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(255,68,68,0.6)';
  destMarker = new mapboxgl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map);
  map.flyTo({ center: [lng, lat], zoom: 14 });
  fetchRoute(lng, lat, name);
}

async function fetchRoute(destLng, destLat, destName) {
  if (!userLng) { showToast('Tunggu GPS aktif'); return; }
  const token = localStorage.getItem(MAPBOX_TOKEN_KEY);
  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${userLng},${userLat};${destLng},${destLat}?steps=true&voice_instructions=true&banner_instructions=true&voice_units=metric&language=id&geometries=geojson&overview=full&access_token=${token}`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (!d.routes || !d.routes.length) { showToast('Rute tidak ditemukan'); return; }
    startNavigation(d.routes[0], destName);
  } catch(e) { showToast('Gagal mengambil rute'); }
}

// ============================================================
// NAVIGATION
// ============================================================
function startNavigation(route, destName) {
  isNavigating = true;
  routeSteps = route.legs[0].steps;
  currentStepIdx = 0;
  lastSpokenStep = -1;

  // Draw route
  map.getSource('route').setData({ type: 'Feature', geometry: route.geometry });

  // Update meta
  const distKm = (route.distance / 1000).toFixed(1);
  const mins = Math.round(route.duration / 60);
  document.getElementById('meta-dist').textContent = distKm + ' km';
  document.getElementById('meta-eta').textContent = mins + ' mnt';

  // Show nav panel, hide topbar
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('nav-panel').style.display = 'flex';

  // Pitch map
  map.flyTo({ center: [userLng, userLat], zoom: 17, pitch: 60, bearing: 0 });

  updateInstruction(routeSteps[0]);
  speak('Navigasi dimulai. ' + routeSteps[0].maneuver.instruction);

  // Start BLE send loop
  if (bleConnected) {
    sendInterval = setInterval(() => captureAndSend(), 3000);
  }

  showToast('Navigasi ke ' + destName);
}

function stopNavigation() {
  isNavigating = false;
  clearInterval(sendInterval);
  map.getSource('route').setData({ type: 'FeatureCollection', features: [] });
  document.getElementById('topbar').style.display = 'block';
  document.getElementById('nav-panel').style.display = 'none';
  map.flyTo({ pitch: 0, zoom: 14 });
  speak('Navigasi dihentikan');
}

function updateNavProgress() {
  if (!routeSteps.length) return;
  const step = routeSteps[currentStepIdx];
  if (!step) return;

  // Compute distance to next maneuver
  const maneuverCoord = step.maneuver.location;
  const dist = haversine(userLat, userLng, maneuverCoord[1], maneuverCoord[0]);

  updateInstruction(step, dist);

  // Advance step if within 20m
  if (dist < 20 && currentStepIdx < routeSteps.length - 1) {
    currentStepIdx++;
    const next = routeSteps[currentStepIdx];
    updateInstruction(next);
  }

  // Speak when approaching (within 150m), once per step
  if (dist < 150 && lastSpokenStep !== currentStepIdx) {
    lastSpokenStep = currentStepIdx;
    const inst = step.maneuver.instruction;
    const distTxt = dist > 1000 ? (dist/1000).toFixed(1)+' kilometer' : Math.round(dist)+' meter';
    speak('Dalam ' + distTxt + ', ' + inst);
  }
}

function updateInstruction(step, dist) {
  const distText = dist !== undefined
    ? (dist >= 1000 ? (dist/1000).toFixed(1)+' km' : Math.round(dist)+' m')
    : formatDistance(step.distance);
  document.getElementById('inst-distance').textContent = distText;
  document.getElementById('inst-text').textContent = step.maneuver.instruction || '';
  setManeuverIcon(step.maneuver.type, step.maneuver.modifier);
}

function setManeuverIcon(type, modifier) {
  // SVG paths for common maneuvers
  const icons = {
    'turn-right': 'M8 5v3.17L4.83 5 3.41 6.41 7.17 10.17H4v2h6V6H8zm2 13v-2H6v2h4zm5.17-11L14 5.83V3l-4 4 4 4V8.83l1.17 1.17H13v2h6V6h-2v.83L15.17 7z',
    'turn-left': 'M16 5v3.17L19.17 5 20.59 6.41 16.83 10.17H20v2h-6V6h2V5zm-2 13v-2h4v2h-4zM8.83 7L10 5.83V3l4 4-4 4V8.83L8.83 10H11V8H5v6h2v-2h2.83L8.83 7z',
    'straight': 'M12 2l-4 4h3v13h2V6h3z',
    'arrive': 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
    'depart': 'M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z',
    'roundabout': 'M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z',
    'uturn': 'M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z',
  };

  let key = 'straight';
  if (type === 'arrive') key = 'arrive';
  else if (type === 'depart') key = 'depart';
  else if (type === 'roundabout' || type === 'rotary') key = 'roundabout';
  else if (type === 'turn' || type === 'end of road') {
    if (modifier && modifier.includes('right')) key = 'turn-right';
    else if (modifier && modifier.includes('left')) key = 'turn-left';
    else if (modifier && modifier.includes('uturn')) key = 'uturn';
  }

  document.getElementById('maneuver-svg').innerHTML = `<path d="${icons[key] || icons.straight}"/>`;
}

// ============================================================
// BLE
// ============================================================
async function toggleBle() {
  if (bleConnected) {
    if (bleDevice) bleDevice.gatt.disconnect();
    bleConnected = false;
    bleChar = null;
    clearInterval(sendInterval);
    updateBleUI(false);
    showToast('BLE terputus');
    return;
  }
  if (!navigator.bluetooth) { showToast('Web Bluetooth tidak didukung'); return; }
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [BLE_SERVICE]
    });
    bleDevice.addEventListener('gattserverdisconnected', () => {
      bleConnected = false; bleChar = null;
      clearInterval(sendInterval);
      updateBleUI(false);
      showToast('Dashboard terputus');
    });
    const server = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(BLE_SERVICE);
    bleChar = await service.getCharacteristic(BLE_CHAR);
    bleConnected = true;
    updateBleUI(true, bleDevice.name || 'Dashboard');
    showToast('Terhubung ke ' + (bleDevice.name || 'Dashboard'));
    if (isNavigating) sendInterval = setInterval(() => captureAndSend(), 3000);
  } catch(e) {
    if (e.name !== 'NotFoundError') showToast('BLE error: ' + e.message);
  }
}

function updateBleUI(connected, name) {
  const btn = document.getElementById('btn-ble');
  const lbl = document.getElementById('ble-label');
  btn.className = connected ? 'connected' : '';
  lbl.textContent = connected ? (name || 'Terhubung') : 'Hubungkan Dashboard';
}

async function captureAndSend() {
  if (!bleChar || !map) return;
  try {
    const b64 = await snapMapToBase64();
    if (!b64) return;

    const cmd = `AT+MAPS="${b64}"\r\n`;

    // Send in chunks of 512 bytes (BLE MTU safe)
    const encoder = new TextEncoder();
    const bytes = encoder.encode(cmd);
    const CHUNK = 512;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      await bleChar.writeValueWithoutResponse(bytes.slice(i, i + CHUNK));
      await new Promise(r => setTimeout(r, 20));
    }

    const chars = b64.length;
    document.getElementById('ble-send-status').textContent = chars + ' chr';
    if (chars > 7000) document.getElementById('ble-send-status').style.color = 'var(--accent2)';
    else document.getElementById('ble-send-status').style.color = 'var(--green)';

  } catch(e) {
    document.getElementById('ble-send-status').textContent = 'Err';
  }
}

async function snapMapToBase64() {
  return new Promise((resolve) => {
    // Mapbox preserveDrawingBuffer must be true — we handle via canvas copy
    const canvas = map.getCanvas();
    const snap = document.getElementById('snap-canvas');
    snap.width = 300;
    snap.height = 400;
    const ctx = snap.getContext('2d');

    // Draw map canvas onto snap canvas (center crop of map viewport)
    const mw = canvas.width, mh = canvas.height;
    const targetRatio = 300 / 400;
    let sw, sh, sx, sy;
    if (mw / mh > targetRatio) {
      sh = mh; sw = mh * targetRatio;
      sx = (mw - sw) / 2; sy = 0;
    } else {
      sw = mw; sh = mw / targetRatio;
      sx = 0; sy = (mh - sh) / 2;
    }
    ctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, 300, 400);

    // Try quality until base64 < 7000 chars
    let q = imageQuality;
    let b64;
    do {
      const dataUrl = snap.toDataURL('image/jpeg', q);
      b64 = dataUrl.split(',')[1];
      if (b64.length <= 7000) { imageQuality = q; break; }
      q -= 0.03;
    } while (q > 0.05);

    resolve(b64 && b64.length <= 7000 ? b64 : null);
  });
}

// ============================================================
// VOICE
// ============================================================
function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'id-ID';
  u.rate = 1.0;
  u.volume = 1.0;
  window.speechSynthesis.speak(u);
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById('btn-voice').classList.toggle('active', voiceEnabled);
  showToast(voiceEnabled ? 'Suara aktif' : 'Suara mati');
}

// ============================================================
// NIGHT MODE
// ============================================================
function toggleNight() {
  nightMode = !nightMode;
  document.getElementById('btn-night').classList.toggle('active', nightMode);
  if (map) {
    map.setStyle(nightMode
      ? 'mapbox://styles/mapbox/navigation-night-v1'
      : 'mapbox://styles/mapbox/dark-v11');
    map.once('styledata', () => {
      map.addSource('route', { type: 'geojson', data: routeGeojson || { type: 'FeatureCollection', features: [] } });
      map.addLayer({ id: 'route-line', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#00d4ff', 'line-width': 5 } });
    });
  }
}

// ============================================================
// UTILS
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(m) {
  return m >= 1000 ? (m/1000).toFixed(1)+' km' : Math.round(m)+' m';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// MAP PRESERVING DRAWING BUFFER
// ============================================================
// Mapbox GL default doesn't preserve drawing buffer for perf reasons.
// We need to re-init map with preserveDrawingBuffer: true after token is loaded.
const _origInitMap = initMap;
window.initMap = function(token) {
  mapboxgl.accessToken = token;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    zoom: 14,
    center: [106.816666, -6.200000],
    pitch: 0,
    preserveDrawingBuffer: true,
  });
  map.addControl(new mapboxgl.NavigationControl({ showCompass: true, visualizePitch: true }), 'top-right');
  map.on('load', () => {
    startGPS();
    map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({ id: 'route-line', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#00d4ff', 'line-width': 5, 'line-opacity': 0.9 } });
  });
  map.on('click', e => { if (!isNavigating) setDestination(e.lngLat.lng, e.lngLat.lat, 'Titik yang dipilih'); });
};

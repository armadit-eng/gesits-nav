<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GNav</title>
<link rel="manifest" href="manifest.json">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #00d4ff;
    --accent2: #ff4444;
    --text: #f0f0f0;
    --text2: #888;
    --green: #00e676;
    --orange: #ff9100;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }

  #map { position: fixed; inset: 0; z-index: 0; }

  /* TOP BAR */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(to bottom, rgba(10,10,10,0.97) 70%, transparent);
    padding: 48px 16px 24px;
  }

  #search-row {
    display: flex; gap: 8px; align-items: center;
  }

  #search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px; padding: 12px 16px;
    outline: none; transition: border-color .2s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text2); }

  #btn-search {
    background: var(--accent); border: none; border-radius: 12px;
    width: 46px; height: 46px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #btn-search svg { width: 20px; height: 20px; fill: #000; }

  /* SEARCH RESULTS */
  #search-results {
    margin-top: 8px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    display: none;
  }
  .search-item {
    padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: var(--surface2); }
  .search-item .place-name { font-size: 14px; font-weight: 500; }
  .search-item .place-addr { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* NAV INSTRUCTION PANEL - mirip Gesits */
  #nav-panel {
    position: fixed; top: 0; left: 0; right: 0; z-index: 110;
    display: none; flex-direction: column;
  }

  /* Instruction bar besar - mirip Gesits */
  #instruction-main {
    display: flex; align-items: center; gap: 12px;
    background: #f5f5f5; padding: 14px 16px 14px 16px;
    padding-top: 48px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #maneuver-icon {
    width: 52px; height: 52px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #maneuver-icon svg { width: 44px; height: 44px; fill: #222; }
  #instruction-text { flex: 1; }
  #inst-distance { font-size: 28px; font-weight: 900; color: #111; line-height: 1; }
  #inst-text { font-size: 17px; font-weight: 600; color: #333; margin-top: 3px; }

  /* Sub bar: jarak + ETA + speed */
  #nav-meta {
    display: flex; gap: 0; background: #222;
  }
  .meta-chip {
    flex: 1; padding: 8px 12px; text-align: center;
    border-right: 1px solid #333;
  }
  .meta-chip:last-child { border-right: none; }
  .meta-chip .val { font-size: 16px; font-weight: 700; color: #fff; }
  .meta-chip .lbl { font-size: 10px; color: var(--text2); margin-top: 1px; text-transform: uppercase; letter-spacing: .5px; }

  #btn-stop-nav {
    background: var(--accent2); border: none;
    color: #fff; font-size: 13px; font-weight: 700; padding: 10px;
    cursor: pointer; letter-spacing: .5px; width: 100%;
  }

  /* PREVIEW PANEL */
  #preview-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 110;
    background: var(--bg); padding: 16px 16px 32px;
    display: none; flex-direction: column; gap: 10px;
    border-top: 1px solid var(--border);
  }
  #preview-dest {
    font-size: 16px; font-weight: 700; color: var(--text);
  }
  #preview-meta {
    display: flex; gap: 16px;
  }
  #preview-meta span {
    font-size: 14px; color: var(--accent); font-weight: 600;
  }
  #preview-steps {
    max-height: 130px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
  }
  .preview-step {
    font-size: 12px; color: var(--text2); padding: 5px 0;
    border-bottom: 1px solid var(--border); display: flex; gap: 8px;
  }
  .preview-step .ps-dist { color: var(--accent); min-width: 45px; font-weight: 600; }
  #preview-btns {
    display: flex; gap: 8px; margin-top: 4px;
  }
  #btn-cancel-preview {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 14px;
    font-weight: 600; padding: 13px; cursor: pointer;
  }
  #btn-start-nav {
    flex: 2; background: var(--accent); border: none;
    border-radius: 12px; color: #000; font-size: 15px;
    font-weight: 700; padding: 13px; cursor: pointer;
  }

  /* BOTTOM PANEL */
  #bottom-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(to top, rgba(10,10,10,0.98) 80%, transparent);
    padding: 16px 16px 32px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* BLE STATUS */
  #ble-row {
    display: flex; align-items: center; gap: 10px;
  }

  #btn-ble {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; cursor: pointer;
    color: var(--text); font-size: 13px; font-weight: 500;
    transition: border-color .2s, background .2s; flex: 1;
  }
  #btn-ble.connected { border-color: var(--green); }
  #btn-ble.connected #ble-dot { background: var(--green); }
  #ble-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text2); flex-shrink: 0;
    transition: background .3s;
  }
  #ble-label { flex: 1; }

  #ble-send-status {
    font-size: 11px; color: var(--text2); text-align: right;
    min-width: 60px;
  }

  /* BOTTOM BUTTONS */
  #btn-row {
    display: flex; gap: 8px;
  }
  .btn-action {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 500;
    padding: 11px 8px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; gap: 6px;
    transition: background .15s;
  }
  .btn-action:hover { background: var(--surface2); }
  .btn-action svg { width: 16px; height: 16px; fill: currentColor; }
  .btn-action.active { border-color: var(--accent); color: var(--accent); }

  /* SETTINGS MODAL */
  #settings-modal {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.88); display: none;
    align-items: flex-end; justify-content: center;
    padding: 0;
  }
  #settings-modal.show { display: flex; }
  #settings-card {
    background: var(--surface); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px; padding: 20px 20px 36px;
    max-height: 90vh; overflow-y: auto;
  }
  .set-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .set-header span { font-size: 17px; font-weight: 700; }
  #btn-close-settings {
    background: var(--surface2); border: none; color: var(--text);
    width: 32px; height: 32px; border-radius: 50%; font-size: 14px;
    cursor: pointer;
  }
  .set-section { margin-bottom: 4px; }
  .set-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  .set-label { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .8px; margin-bottom: 6px; margin-top: 12px; }
  .set-hint { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }
  .set-accent { color: var(--accent); font-weight: 700; }
  .set-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 13px;
    padding: 12px; outline: none; box-sizing: border-box;
  }
  .set-input:focus { border-color: var(--accent); }
  .mono { font-family: monospace; font-size: 12px; }
  .set-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .preset-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 12px;
    padding: 7px 12px; cursor: pointer;
  }
  .preset-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.1); }
  .set-uuid-hint {
    font-size: 12px; color: var(--accent); font-family: monospace;
    margin-top: 8px; padding: 10px; background: rgba(0,212,255,0.08);
    border-radius: 8px; line-height: 1.6; display: none;
  }
  .set-divider { height: 1px; background: var(--border); margin: 16px 0; }
  .set-btns { display: flex; gap: 10px; margin-top: 20px; }
  #btn-cancel-settings {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 14px;
    font-weight: 600; padding: 14px; cursor: pointer;
  }
  #btn-save-settings {
    flex: 2; background: var(--accent); border: none;
    border-radius: 12px; color: #000; font-size: 15px;
    font-weight: 700; padding: 14px; cursor: pointer;
  }

  /* TOAST */
  #toast {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px; font-size: 13px;
    opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none;
    z-index: 300; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MAPBOX overrides */
  .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none; }
  .mapboxgl-ctrl-top-right { top: 60px !important; }

  /* Locate button */
  #btn-locate {
    position: fixed; right: 16px; bottom: 150px; z-index: 100;
    width: 44px; height: 44px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text);
  }
  #btn-locate svg { width: 20px; height: 20px; fill: currentColor; }

  /* Hidden canvas for screenshot */
  #snap-canvas { display: none; }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="snap-canvas"></canvas>

<!-- SETTINGS MODAL -->
<div id="settings-modal">
  <div id="settings-card">
    <div class="set-header">

    </div>

      <p class="set-hint">Token disimpan di browser, tidak dikirim ke server.</p>

    <div class="set-divider"></div>

<div id="topbar">

<!-- NAV PANEL (visible during navigation) -->

  <div id="preview-dest"></div>

    <span id="preview-dist">--</span>

  </div>

  <div id="preview-btns">

    <button id="btn-start-nav">▶ Mulai Navigasi</button>

<!-- NAV PANEL (saat navigasi aktif) -->

  <div id="instruction-main">
    <div id="maneuver-icon">
      <svg id="maneuver-svg" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
    </div>

      <div id="inst-distance">--</div>

🌙 Malam

<script>
// ============================================================
// STATE
// ============================================================
let map, userMarker, destMarker, routeGeojson;
let currentRouteData = { type: 'FeatureCollection', features: [] };
let wakeLock = null;
let noSleepAudio = null;
let serialPort = null, serialWriter = null;
let bleConnected = false;
let isNavigating = false;
let voiceEnabled = true;
let nightMode = false;
let userLng = null, userLat = null;
let watchId = null;
let currentStepIdx = 0;
let routeSteps = [];
let lastSpokenStep = -1;
let sendInterval = null;
let imageQuality = 0.25; // JPEG quality — tune until base64 < 7000 chars

const MAPBOX_TOKEN_KEY = 'gnav_mapbox_token';
const BAUD_RATE = 9600;

// ============================================================
// SETTINGS MODAL
// ============================================================
function expandUUID(val) {
  val = val.trim().toLowerCase();
  if (val.length === 4) return '0000' + val + '-0000-1000-8000-00805f9b34fb';
  if (val.length === 8) return val + '-0000-1000-8000-00805f9b34fb';
  return val;
}

function openSettings() {
  document.getElementById('token-input').value = localStorage.getItem(MAPBOX_TOKEN_KEY) || '';
  document.getElementById('snap-w').value = localStorage.getItem('snap_w') || '350';
  document.getElementById('snap-h').value = localStorage.getItem('snap_h') || '220';
  document.getElementById('settings-modal').classList.add('show');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('show');
}

function initSettings() {
  document.getElementById('btn-close-settings').addEventListener('click', closeSettings);
  document.getElementById('btn-cancel-settings').addEventListener('click', closeSettings);

  document.getElementById('btn-save-settings').addEventListener('click', () => {
    const token = document.getElementById('token-input').value.trim();
    if (!token.startsWith('pk.')) { showToast('Token tidak valid'); return; }

    const snapW = parseInt(document.getElementById('snap-w').value) || 350;
    const snapH = parseInt(document.getElementById('snap-h').value) || 220;

    localStorage.setItem(MAPBOX_TOKEN_KEY, token);
    localStorage.setItem('snap_w', snapW);
    localStorage.setItem('snap_h', snapH);

    closeSettings();
    showToast('✓ Tersimpan');

    if (token !== mapboxgl.accessToken) {
      if (map) map.remove();
      initMap(token);
    }
  });

  // Show on first load if no token
  const saved = localStorage.getItem(MAPBOX_TOKEN_KEY);
  if (!saved) openSettings();
}

// ============================================================
// WAKE LOCK + NO SLEEP
// ============================================================
async function acquireWakeLock() {
  // Layer 1: Screen Wake Lock API
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        // Re-acquire jika navigasi masih aktif
        if (isNavigating) acquireWakeLock();
      });
    } catch(e) {}
  }

  // Layer 2: Silent audio loop (cegah Chrome suspend tab di background)
  try {
    if (!noSleepAudio) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.loop = true;
      src.connect(ctx.destination);
      src.start(0);
      noSleepAudio = { ctx, src };
    }
  } catch(e) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  if (noSleepAudio) {
    try { noSleepAudio.src.stop(); noSleepAudio.ctx.close(); } catch(e) {}
    noSleepAudio = null;
  }
}

// Re-acquire wake lock saat tab kembali ke foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (isNavigating) acquireWakeLock();
    // Resume send interval jika navigasi aktif
    if (isNavigating && bleConnected && !sendInterval) {
      sendInterval = setInterval(() => captureAndSend(), 3000);
    }
  } else {
    // Tab hidden — clear interval, akan di-resume saat kembali
    // GPS + serial tetap aktif, hanya snapshot dihentikan sementara
    clearInterval(sendInterval);
    sendInterval = null;
  }
});

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  const saved = localStorage.getItem(MAPBOX_TOKEN_KEY);
  if (saved) { initMap(saved); }
  // First-time setup handled in initSettings()

  // Settings modal handled in initSettings()

  document.getElementById('btn-settings').addEventListener('click', openSettings);
  initSettings();

  document.getElementById('btn-ble').addEventListener('click', toggleBle);
  document.getElementById('btn-stop-nav').addEventListener('click', stopNavigation);
  document.getElementById('btn-start-nav').addEventListener('click', () => {
    if (pendingRoute) startNavigation(pendingRoute, pendingDestName);
  });
  document.getElementById('btn-cancel-preview').addEventListener('click', cancelPreview);
  document.getElementById('btn-locate').addEventListener('click', centerOnUser);
  document.getElementById('btn-voice').addEventListener('click', toggleVoice);
  document.getElementById('btn-night').addEventListener('click', cycleMapStyle);
  document.getElementById('btn-search').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
});

function initMap(token) {
  mapboxgl.accessToken = token;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    zoom: 14,
    center: [106.816666, -6.200000],
    pitch: 0,
  });

  map.addControl(new mapboxgl.NavigationControl({ showCompass: true, visualizePitch: true }), 'top-right');

  map.on('load', () => {
    startGPS();
    map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    // Route casing (border putih di bawah)
    map.addLayer({
      id: 'route-casing', type: 'line', source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': '#ffffff', 'line-width': 14, 'line-opacity': 0.6 }
    });
    // Route utama
    map.addLayer({
      id: 'route-line', type: 'line', source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': '#2979ff', 'line-width': 10, 'line-opacity': 1.0 }
    });
  });

  map.on('click', e => {
    if (!isNavigating) setDestination(e.lngLat.lng, e.lngLat.lat, 'Titik yang dipilih');
  });
}

// ============================================================
// GPS
// ============================================================
function drawArrow(canvas, heading) {
  const ctx = canvas.getContext('2d');
  const cx = 20, cy = 20, r = 18;
  ctx.clearRect(0, 0, 40, 40);

  // Outer glow ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,212,255,0.2)';
  ctx.fill();

  // Arrow pointing up (north = 0 bearing)
  // Rotate canvas by heading
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate((heading * Math.PI) / 180);

  // Arrow body
  ctx.beginPath();
  ctx.moveTo(0, -14);   // tip top
  ctx.lineTo(8, 8);     // bottom right
  ctx.lineTo(0, 4);     // inner bottom
  ctx.lineTo(-8, 8);    // bottom left
  ctx.closePath();
  ctx.fillStyle = '#00d4ff';
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

function startGPS() {
  if (!navigator.geolocation) { showToast('GPS tidak tersedia'); return; }
  watchId = navigator.geolocation.watchPosition(pos => {
    userLng = pos.coords.longitude;
    userLat = pos.coords.latitude;
    const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
    const heading = pos.coords.heading; // bearing dari GPS
    document.getElementById('meta-speed').textContent = speed;

    if (!userMarker) {
      // Canvas-based arrow marker — lebih reliable di mobile WebView
      const c = document.createElement('canvas');
      c.width = 40; c.height = 40;
      c.id = 'arrow-canvas';
      drawArrow(c, 0);
      userMarker = new mapboxgl.Marker({
        element: c,
        rotationAlignment: 'map',
        pitchAlignment: 'map'
      }).setLngLat([userLng, userLat]).addTo(map);
      map.flyTo({ center: [userLng, userLat], zoom: 17 });
    } else {
      userMarker.setLngLat([userLng, userLat]);
    }

    // Rotate marker & map bearing ikut heading
    if (heading !== null && !isNaN(heading)) {
      const c = document.getElementById('arrow-canvas');
      if (c) drawArrow(c, heading);
      if (isNavigating) {
        map.easeTo({ bearing: heading, center: [userLng, userLat], duration: 400 });
      }
    }

    if (isNavigating) {
      updateNavProgress();
      if (bleConnected) captureAndSend();
    }
  }, err => {
    showToast('GPS: ' + err.message);
  }, { enableHighAccuracy: true, maximumAge: 500 });
}

function centerOnUser() {
  if (userLng) map.flyTo({ center: [userLng, userLat], zoom: 16, pitch: 45 });
}

// ============================================================
// SEARCH (Mapbox Geocoding)
// ============================================================
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  // Deteksi Google Maps link
  if (q.includes('google.com/maps') || q.includes('maps.app.goo.gl') || q.includes('goo.gl/maps')) {
    await importGoogleMapsLink(q);
    return;
  }

  const token = localStorage.getItem(MAPBOX_TOKEN_KEY);
  const prox = userLng ? `&proximity=${userLng},${userLat}` : '';
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${token}&language=id&country=ID${prox}&limit=5`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    showSearchResults(d.features || []);
  } catch(e) { showToast('Gagal mencari lokasi'); }
}

async function importGoogleMapsLink(url) {
  showToast('Membaca link Google Maps...');
  try {
    // Coba extract koordinat dari URL langsung
    // Format: @lat,lng atau !3dlat!4dlng atau ?q=lat,lng
    let lat = null, lng = null, name = 'Tujuan dari Google Maps';

    // Format 1: maps/place/.../@lat,lng,zoom
    const atMatch = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (atMatch) { lat = parseFloat(atMatch[1]); lng = parseFloat(atMatch[2]); }

    // Format 2: ?q=lat,lng
    if (!lat) {
      const qMatch = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (qMatch) { lat = parseFloat(qMatch[1]); lng = parseFloat(qMatch[2]); }
    }

    // Format 3: destination=lat,lng
    if (!lat) {
      const dMatch = url.match(/destination=(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (dMatch) { lat = parseFloat(dMatch[1]); lng = parseFloat(dMatch[2]); }
    }

    // Format 4: !3dlat!4dlng
    if (!lat) {
      const bangMatch = url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
      if (bangMatch) { lat = parseFloat(bangMatch[1]); lng = parseFloat(bangMatch[2]); }
    }

    if (lat && lng) {
      // Reverse geocode untuk dapat nama tempat
      const token = localStorage.getItem(MAPBOX_TOKEN_KEY);
      try {
        const r = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${token}&language=id&limit=1`);
        const d = await r.json();
        if (d.features && d.features.length) name = d.features[0].text;
      } catch(e) {}
      document.getElementById('search-input').value = name;
      setDestination(lng, lat, name);
      return;
    }

    // Link pendek (goo.gl/maps atau maps.app.goo.gl) — tidak bisa di-resolve dari browser
    // karena CORS. Minta user expand dulu
    showToast('Paste link lengkapnya (buka di browser dulu, copy dari address bar)');
  } catch(e) {
    showToast('Gagal baca link Google Maps');
  }
}

function showSearchResults(features) {
  const el = document.getElementById('search-results');
  el.innerHTML = '';
  if (!features.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  features.forEach(f => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.innerHTML = `<div class="place-name">${f.text}</div><div class="place-addr">${f.place_name}</div>`;
    div.addEventListener('click', () => {
      el.style.display = 'none';
      document.getElementById('search-input').value = f.text;
      setDestination(f.center[0], f.center[1], f.text);
    });
    el.appendChild(div);
  });
}

// ============================================================
// DESTINATION & ROUTING
// ============================================================
function setDestination(lng, lat, name) {
  if (destMarker) destMarker.remove();
  const el = document.createElement('div');
  el.style.cssText = 'width:20px;height:20px;background:#ff4444;border:3px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(255,68,68,0.6)';
  destMarker = new mapboxgl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map);
  map.flyTo({ center: [lng, lat], zoom: 14 });
  fetchRoute(lng, lat, name);
}

// pending route untuk preview
let pendingRoute = null;
let pendingDestName = '';

async function fetchRoute(destLng, destLat, destName) {
  if (!userLng) { showToast('Tunggu GPS aktif'); return; }
  const token = localStorage.getItem(MAPBOX_TOKEN_KEY);
  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${userLng},${userLat};${destLng},${destLat}?steps=true&voice_instructions=true&banner_instructions=true&voice_units=metric&language=id&geometries=geojson&overview=full&access_token=${token}`;
  showToast('Mencari rute...');
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (!d.routes || !d.routes.length) { showToast('Rute tidak ditemukan'); return; }
    showPreview(d.routes[0], destName);
  } catch(e) { showToast('Gagal mengambil rute'); }
}

// ============================================================
// PREVIEW (sebelum navigasi dimulai)
// ============================================================
function showPreview(route, destName) {
  pendingRoute = route;
  pendingDestName = destName;

  // Draw route on map
  const rd1 = { type: 'Feature', geometry: route.geometry };
  currentRouteData = rd1;
  map.getSource('route').setData(rd1);

  // Fill preview panel
  const distKm = (route.distance / 1000).toFixed(1);
  const mins = Math.round(route.duration / 60);
  document.getElementById('preview-dest').textContent = '📍 ' + destName;
  document.getElementById('preview-dist').textContent = distKm + ' km';
  document.getElementById('preview-eta').textContent = mins + ' menit';

  // List first steps
  const stepsEl = document.getElementById('preview-steps');
  stepsEl.innerHTML = '';
  const steps = route.legs[0].steps.slice(0, 8);
  steps.forEach(s => {
    const dist = s.distance >= 1000 ? (s.distance/1000).toFixed(1)+'km' : Math.round(s.distance)+'m';
    const div = document.createElement('div');
    div.className = 'preview-step';
    div.innerHTML = `<span class="ps-dist">${dist}</span><span>${s.maneuver.instruction}</span>`;
    stepsEl.appendChild(div);
  });

  // Show preview, hide topbar
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('preview-panel').style.display = 'flex';
  document.getElementById('nav-panel').style.display = 'none';

  // Fit map to route
  const coords = route.geometry.coordinates;
  const bounds = coords.reduce((b, c) => b.extend(c), new mapboxgl.LngLatBounds(coords[0], coords[0]));
  map.fitBounds(bounds, { padding: { top: 80, bottom: 250, left: 40, right: 40 } });
}

function cancelPreview() {
  pendingRoute = null;
  pendingDestName = '';
  document.getElementById('preview-panel').style.display = 'none';
  document.getElementById('topbar').style.display = 'block';
  map.getSource('route').setData({ type: 'FeatureCollection', features: [] });
  if (destMarker) { destMarker.remove(); destMarker = null; }
}

// ============================================================
// NAVIGATION
// ============================================================
function startNavigation(route, destName) {
  isNavigating = true;
  routeSteps = route.legs[0].steps;
  currentStepIdx = 0;
  lastSpokenStep = -1;

  const rd2 = { type: 'Feature', geometry: route.geometry };
  currentRouteData = rd2;
  map.getSource('route').setData(rd2);

  const distKm = (route.distance / 1000).toFixed(1);
  const mins = Math.round(route.duration / 60);
  document.getElementById('meta-dist').textContent = distKm + ' km';
  document.getElementById('meta-eta').textContent = mins + ' mnt';

  // Hide preview + topbar, show nav panel
  document.getElementById('preview-panel').style.display = 'none';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('nav-panel').style.display = 'flex';

  // Map: ikut bearing user, pitch 45
  map.flyTo({ center: [userLng, userLat], zoom: 17, pitch: 45, bearing: 0 });

  updateInstruction(routeSteps[0]);
  speak('Navigasi dimulai. ' + routeSteps[0].maneuver.instruction);

  if (bleConnected) {
    clearInterval(sendInterval);
    sendInterval = setInterval(() => captureAndSend(), 3000);
  }
  acquireWakeLock();
  showToast('Navigasi ke ' + destName);
}

function stopNavigation() {
  isNavigating = false;
  clearInterval(sendInterval);
  map.getSource('route').setData({ type: 'FeatureCollection', features: [] });
  document.getElementById('topbar').style.display = 'block';
  document.getElementById('nav-panel').style.display = 'none';
  document.getElementById('preview-panel').style.display = 'none';
  if (destMarker) { destMarker.remove(); destMarker = null; }
  map.flyTo({ pitch: 0, zoom: 14, bearing: 0 });
  releaseWakeLock();
  speak('Navigasi dihentikan');
}

let offRouteCount = 0;
const OFF_ROUTE_THRESHOLD = 60;  // meter
const OFF_ROUTE_TRIGGERS = 3;    // deteksi 3x berturut-turut baru reroute

// Hitung jarak user ke segmen rute terdekat
function distToRoute() {
  if (!currentRouteData || !currentRouteData.geometry) return Infinity;
  const coords = currentRouteData.geometry.coordinates;
  let minDist = Infinity;
  for (let i = 0; i < coords.length - 1; i++) {
    const d = distToSegment(userLat, userLng, coords[i][1], coords[i][0], coords[i+1][1], coords[i+1][0]);
    if (d < minDist) minDist = d;
  }
  return minDist;
}

function distToSegment(pLat, pLng, aLat, aLng, bLat, bLng) {
  // Proyeksi titik P ke segmen AB
  const dx = bLng - aLng, dy = bLat - aLat;
  const lenSq = dx*dx + dy*dy;
  if (lenSq === 0) return haversine(pLat, pLng, aLat, aLng);
  let t = ((pLng - aLng)*dx + (pLat - aLat)*dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return haversine(pLat, pLng, aLat + t*dy, aLng + t*dx);
}

function updateNavProgress() {
  if (!routeSteps.length) return;
  const step = routeSteps[currentStepIdx];
  if (!step) return;

  const maneuverCoord = step.maneuver.location;
  const dist = haversine(userLat, userLng, maneuverCoord[1], maneuverCoord[0]);

  updateInstruction(step, dist);

  // Advance step jika dalam 20m dari maneuver
  if (dist < 20 && currentStepIdx < routeSteps.length - 1) {
    currentStepIdx++;
    offRouteCount = 0;
    updateInstruction(routeSteps[currentStepIdx]);
  }

  // Speak saat approaching (150m), sekali per step
  if (dist < 150 && lastSpokenStep !== currentStepIdx) {
    lastSpokenStep = currentStepIdx;
    const distTxt = dist > 1000 ? (dist/1000).toFixed(1)+' kilometer' : Math.round(dist)+' meter';
    speak('Dalam ' + distTxt + ', ' + step.maneuver.instruction);
  }

  // Deteksi off-route: user jauh dari semua segmen rute
  const dRoute = distToRoute();
  if (dRoute > OFF_ROUTE_THRESHOLD) {
    offRouteCount++;
    if (offRouteCount >= OFF_ROUTE_TRIGGERS) {
      offRouteCount = 0;
      showToast('🔄 Menghitung ulang rute...');
      speak('Menghitung ulang rute');
      // Re-route ke tujuan yang sama (destMarker)
      if (destMarker) {
        const destLngLat = destMarker.getLngLat();
        fetchRoute(destLngLat.lng, destLngLat.lat, pendingDestName || 'Tujuan');
      }
    }
  } else {
    offRouteCount = 0;
  }
}

function updateInstruction(step, dist) {
  const distText = dist !== undefined
    ? (dist >= 1000 ? (dist/1000).toFixed(1)+' km' : Math.round(dist)+' m')
    : formatDistance(step.distance);
  document.getElementById('inst-distance').textContent = distText;
  document.getElementById('inst-text').textContent = step.maneuver.instruction || '';
  setManeuverIcon(step.maneuver.type, step.maneuver.modifier);
}

  const icons = {
    'turn-right': 'M8 5v3.17L4.83 5 3.41 6.41 7.17 10.17H4v2h6V6H8zm2 13v-2H6v2h4zm5.17-11L14 5.83V3l-4 4 4 4V8.83l1.17 1.17H13v2h6V6h-2v.83L15.17 7z',
    'turn-left': 'M16 5v3.17L19.17 5 20.59 6.41 16.83 10.17H20v2h-6V6h2V5zm-2 13v-2h4v2h-4zM8.83 7L10 5.83V3l4 4-4 4V8.83L8.83 10H11V8H5v6h2v-2h2.83L8.83 7z',
    'straight': 'M12 2l-4 4h3v13h2V6h3z',
    'arrive': 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
    'depart': 'M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z',
    'roundabout': 'M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z',
    'uturn': 'M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z',
  };

  let key = 'straight';
  if (type === 'arrive') key = 'arrive';
  else if (type === 'depart') key = 'depart';
  else if (type === 'roundabout' || type === 'rotary') key = 'roundabout';
  else if (type === 'turn' || type === 'end of road') {
    if (modifier && modifier.includes('right')) key = 'turn-right';
    else if (modifier && modifier.includes('left')) key = 'turn-left';
    else if (modifier && modifier.includes('uturn')) key = 'uturn';
  }

  document.getElementById('maneuver-svg').innerHTML = `<path d="${icons[key] || icons.straight}"/>`;
}

// ============================================================
// WEB SERIAL (Bluetooth Classic SPP)
// ============================================================
async function toggleBle() {
  if (bleConnected) {
    try {
      if (serialWriter) { serialWriter.releaseLock(); serialWriter = null; }
      if (serialPort) { await serialPort.close(); serialPort = null; }
    } catch(e) {}
    bleConnected = false;
    clearInterval(sendInterval);
    updateBleUI(false);
    showToast('Serial terputus');
    return;
  }

  if (!navigator.serial) {
    showToast('Gunakan Chrome/Edge — Web Serial tidak tersedia');
    return;
  }

  updateBleUI('connecting');
  try {
    serialPort = await navigator.serial.requestPort();
    await serialPort.open({ baudRate: BAUD_RATE });
    serialWriter = serialPort.writable.getWriter();
    bleConnected = true;
    updateBleUI(true, 'Serial Terhubung');
    showToast('✓ Serial terhubung');

    // Test write + sync jam dashboard
    await sendATCommand(getTimeCommand());

    if (isNavigating) {
      clearInterval(sendInterval);
      sendInterval = setInterval(() => captureAndSend(), 3000);
    }
  } catch(e) {
    serialPort = null; serialWriter = null;
    updateBleUI(false);
    if (e.name !== 'NotFoundError' && e.name !== 'AbortError') {
      showToast('Gagal: ' + (e.message || e.name));
    } else {
      showToast('Dibatalkan');
    }
  }
}

function updateBleUI(state, name) {
  const btn = document.getElementById('btn-ble');
  const lbl = document.getElementById('ble-label');
  if (state === true) {
    btn.className = 'connected';
    lbl.textContent = name || 'Terhubung';
  } else if (state === 'connecting') {
    btn.className = '';
    lbl.textContent = 'Menghubungkan...';
  } else {
    btn.className = '';
    lbl.textContent = 'Hubungkan Dashboard';
  }
}

// Kirim AT command via Web Serial
// Serial write queue — cegah concurrent write (WritableStream locked error)
let writeQueue = Promise.resolve();

function serialWrite(data) {
  writeQueue = writeQueue.then(async () => {
    if (!serialWriter || !bleConnected) return;
    try {
      // Tunggu writer siap sebelum kirim
      await serialWriter.ready;
      await serialWriter.write(new TextEncoder().encode(data));
    } catch(e) {
      console.error('Serial write error:', e.name, e.message);
      document.getElementById('ble-send-status').textContent = 'Err';
      if (e.name === 'InvalidStateError' || e.name === 'NetworkError' || e.message?.includes('locked')) {
        bleConnected = false;
        serialWriter = null;
        serialPort = null;
        clearInterval(sendInterval);
        updateBleUI(false);
        showToast('Serial terputus — hubungkan ulang');
      }
    }
  });
  return writeQueue;
}

async function sendATLarge(cmd) {
  if (!serialWriter) return false;
  await serialWrite(cmd);
  console.log('Sent large:', cmd.length, 'chars');
  return true;
}

async function sendATCommand(cmd) {
  if (!serialWriter) return false;
  await serialWrite(cmd);
  console.log('Sent:', cmd.trim());
  return true;
}

function getTimeCommand() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  return `AT+TIME="${hh}${mm}"\r\n`;
}

function simplifyInstruction(instr) {
  // Ambil hanya bagian sebelum "ke", "menuju", "pada", "di" — buang nama jalan
  const cutWords = [' ke ', ' menuju ', ' pada ', ' di ', ', '];
  let result = instr;
  for (const w of cutWords) {
    const idx = result.indexOf(w);
    if (idx > 0) { result = result.substring(0, idx); break; }
  }
  // Standarisasi tipe umum
  result = result
    .replace(/^teruskan.*/i, 'lurus')
    .replace(/^ikuti.*/i, 'lurus')
    .replace(/^ambil jalur.*/i, 'lurus')
    .trim();
  return result;
}

function getCurrentNavText() {
  if (!isNavigating || !routeSteps.length) return '';
  const step = routeSteps[currentStepIdx];
  if (!step) return '';

  // Jarak real-time: haversine dari posisi user ke koordinat maneuver
  const maneuver = step.maneuver.location;
  const dist = userLng !== null
    ? haversine(userLat, userLng, maneuver[1], maneuver[0])
    : step.distance;

  const distStr = dist >= 1000
    ? (dist / 1000).toFixed(1) + 'km'
    : Math.round(dist) + 'm';

  // Hanya ambil tipe maneuver tanpa nama jalan
  // misal: "belok kiri" bukan "belok kiri ke Jalan 244"
  const rawInstr = step.maneuver.instruction || '';
  const instr = simplifyInstruction(rawInstr);
  const full = distStr + ' ' + instr;

  return full;
}

async function captureAndSend() {
  if (!serialWriter || !bleConnected || !map) return;
  try {
    const b64 = await snapMapToBase64();
    if (!b64) return; // tidak mungkin terjadi tapi jaga-jaga

    const cmd = `AT+MAPS="${b64}"\r\n`;

    // Build AT+NAV — split per kata, max 20 karakter per chunk
    const navText = getCurrentNavText();
    const chunks = [];
    const words = navText.split(' ');
    let current = '';
    for (const word of words) {
      const candidate = current ? current + ' ' + word : word;
      if (candidate.length <= 20) {
        current = candidate;
      } else {
        if (current) chunks.push(current);
        current = word;
      }
    }
    if (current) chunks.push(current);

    // Send MAPS dulu
    if (!bleChar) return;
    await sendATLarge(cmd);

    // Kirim tiap chunk NAV dengan jeda
    for (const chunk of chunks) {
      await new Promise(r => setTimeout(r, 80));
      await sendATCommand(`AT+NAV="${chunk}"\r\n`);
    }

    const chars = b64.length;
    document.getElementById('ble-send-status').textContent = chars + ' chr';
    if (chars > 7000) document.getElementById('ble-send-status').style.color = 'var(--accent2)';
    else if (chars < 6000) document.getElementById('ble-send-status').style.color = 'var(--orange)';
    else document.getElementById('ble-send-status').style.color = 'var(--green)';

  } catch(e) {
    document.getElementById('ble-send-status').textContent = 'Err';
  }
}

async function snapMapToBase64() {
  return new Promise((resolve) => {
    const canvas = map.getCanvas();
    const snap = document.getElementById('snap-canvas');

    // Landscape: sesuaikan rasio kotak dashboard
    // Dari foto dashboard: kotak lebih lebar dari 4:3
    // Coba 16:9 ~ 400x225, atau 3:2 ~ 400x267
    // Ukuran dari settings (default 350x220)
    const OUT_W = parseInt(localStorage.getItem('snap_w')) || 350;
    const OUT_H = parseInt(localStorage.getItem('snap_h')) || 220;
    snap.width = OUT_W;
    snap.height = OUT_H;
    const ctx = snap.getContext('2d');

    // Crop area: ambil dari tengah map canvas (posisi user)
    // lalu scale ke 400x300 landscape
    const mw = canvas.width, mh = canvas.height;
    const targetRatio = OUT_W / OUT_H; // 4:3 landscape
    let sw, sh, sx, sy;
    if (mw / mh > targetRatio) {
      // Map lebih lebar — crop kiri kanan
      sh = mh; sw = mh * targetRatio;
      sx = (mw - sw) / 2; sy = 0;
    } else {
      // Map lebih tinggi — crop atas bawah, user di tengah
      sw = mw; sh = mw / targetRatio;
      sx = 0; sy = (mh - sh) / 2;
    }
    ctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, OUT_W, OUT_H);

    // Overlay arrow di tengah snap canvas (posisi user)
    if (isNavigating) {
      const ax = OUT_W / 2, ay = OUT_H / 2;
      // Ambil heading dari map bearing
      const bearing = map.getBearing();
      ctx.save();
      ctx.translate(ax, ay);
      // Map bearing sudah di-rotate, jadi arrow selalu pointing up di snapshot
      // Draw arrow
      ctx.beginPath();
      ctx.moveTo(0, -14);
      ctx.lineTo(9, 9);
      ctx.lineTo(0, 5);
      ctx.lineTo(-9, 9);
      ctx.closePath();
      ctx.fillStyle = '#00d4ff';
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.fill();
      ctx.stroke();
      // Dot center
      ctx.beginPath();
      ctx.arc(0, 0, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.restore();
    }

    // Auto adjust quality: target 6000-7000 karakter
    const TARGET_MAX = 7000;
    const TARGET_MIN = 6000;
    // Mulai dari imageQuality terakhir yang berhasil, bukan 0.55 tetap
    let q = imageQuality;
    let b64;

    // Turun dulu sampai <= 7000
    for (let i = 0; i < 30; i++) {
      b64 = snap.toDataURL('image/jpeg', q).split(',')[1];
      if (b64.length <= TARGET_MAX) break;
      q = Math.max(0.03, q - 0.03);
    }

    // Paksa turun terus sampai <= 7000, tidak ada pengecualian
    while (b64.length > TARGET_MAX && q > 0.01) {
      q = Math.max(0.01, q - 0.01);
      b64 = snap.toDataURL('image/jpeg', q).split(',')[1];
    }

    // Simpan quality berhasil
    imageQuality = q;

    // Naikan sedikit kalau hasilnya terlalu kecil (agar gambar lebih jelas)
    if (b64.length < TARGET_MIN && imageQuality < 0.85) {
      imageQuality = Math.min(imageQuality + 0.04, 0.85);
    }

    resolve(b64.length <= TARGET_MAX ? b64 : null);
  });
}

function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'id-ID';
  u.rate = 1.0;
  u.volume = 1.0;
  window.speechSynthesis.speak(u);
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById('btn-voice').classList.toggle('active', voiceEnabled);
  showToast(voiceEnabled ? 'Suara aktif' : 'Suara mati');
}

// ============================================================
// MAP STYLE CYCLE: dark -> light -> satellite -> dark
// ============================================================
const MAP_STYLES = [
  { key: 'dark',      label: '🌙 Malam',   url: 'mapbox://styles/mapbox/navigation-night-v1' },
  { key: 'light',     label: '☀️ Siang',   url: 'mapbox://styles/mapbox/navigation-day-v1' },
  { key: 'satellite', label: '🛰️ Satelit', url: 'mapbox://styles/mapbox/satellite-streets-v12' },
];
let mapStyleIdx = 0;

function cycleMapStyle() {
  mapStyleIdx = (mapStyleIdx + 1) % MAP_STYLES.length;
  const style = MAP_STYLES[mapStyleIdx];
  document.getElementById('btn-night').textContent = style.label;
  document.getElementById('btn-night').classList.toggle('active', mapStyleIdx !== 0);
  if (!map) return;

  // Simpan data rute sebelum style berubah
  const savedRoute = currentRouteData;

  map.setStyle(style.url);
  map.once('styledata', () => {
    // Restore route source + layer
    if (!map.getSource('route')) {
      map.addSource('route', { type: 'geojson', data: savedRoute || { type: 'FeatureCollection', features: [] } });
    } else if (savedRoute) {
      map.getSource('route').setData(savedRoute);
    }
    if (!map.getLayer('route-casing')) {
      map.addLayer({
        id: 'route-casing', type: 'line', source: 'route',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': '#ffffff', 'line-width': 14, 'line-opacity': 0.6 }
      });
    }
    if (!map.getLayer('route-line')) {
      map.addLayer({
        id: 'route-line', type: 'line', source: 'route',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': '#2979ff', 'line-width': 10, 'line-opacity': 1.0 }
      });
    }
  });
}

// ============================================================
// UTILS
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(m) {
  return m >= 1000 ? (m/1000).toFixed(1)+' km' : Math.round(m)+' m';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// MAP PRESERVING DRAWING BUFFER
// ============================================================
// Mapbox GL default doesn't preserve drawing buffer for perf reasons.
// We need to re-init map with preserveDrawingBuffer: true after token is loaded.
const _origInitMap = initMap;
window.initMap = function(token) {
  mapboxgl.accessToken = token;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    zoom: 14,
    center: [106.816666, -6.200000],
    pitch: 0,
    preserveDrawingBuffer: true,
  });
  map.addControl(new mapboxgl.NavigationControl({ showCompass: true, visualizePitch: true }), 'top-right');
  map.on('load', () => {
    startGPS();
    map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({ id: 'route-casing', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#ffffff', 'line-width': 14, 'line-opacity': 0.9 } });
    map.addLayer({ id: 'route-line', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#2979ff', 'line-width': 10, 'line-opacity': 1.0 } });
  });
  map.on('click', e => { if (!isNavigating) setDestination(e.lngLat.lng, e.lngLat.lat, 'Titik yang dipilih'); });
};
